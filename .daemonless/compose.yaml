# CIT test compose file
name: affine-test

services:
  postgres:
    image: ghcr.io/daemonless/postgres:latest
    network_mode: host
    annotations:
      org.freebsd.jail.allow.sysvipc: "true"
    environment:
      POSTGRES_USER: affine
      POSTGRES_PASSWORD: testpass
      POSTGRES_DB: affine
      POSTGRES_EXTENSIONS: pgvector

  redis:
    image: ghcr.io/daemonless/redis:latest
    network_mode: host

  affine:
    image: ghcr.io/daemonless/affine:build
    network_mode: host
    environment:
      DATABASE_URL: postgresql://affine:testpass@127.0.0.1:5432/affine
      REDIS_SERVER_HOST: 127.0.0.1
    depends_on:
      - postgres
      - redis
